<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KANO PRODUCTIONS - 夕日が沈むまで夢中になれる作品を</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #d4b07a; }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: linear-gradient(180deg, #f5c842 0%, #f0b830 30%, #e8a830 50%, #deb87a 80%, #d4b07a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            color: #3a2a1a;
            overflow-x: hidden;
        }

        /* ===== Hamburger Button ===== */
        .hamburger {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 1000;
            width: 42px;
            height: 42px;
            background: rgba(50, 35, 20, 0.85);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background: #fff;
            border-radius: 1px;
            transition: 0.3s;
        }

        /* ===== Side Menu ===== */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .menu-overlay.active { opacity: 1; pointer-events: all; }

        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 270px;
            height: 100%;
            background: #3a2a1a;
            z-index: 1200;
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        .side-menu.active { transform: translateX(0); }

        .menu-close {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 42px;
            height: 42px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 26px;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-close:hover { color: #fff; }

        .menu-links {
            margin-top: 68px;
            list-style: none;
        }
        .menu-links li { border-bottom: 1px solid rgba(255,255,255,0.08); }
        .menu-links li:first-child { border-top: 1px solid rgba(255,255,255,0.08); }
        .menu-links a {
            display: block;
            padding: 18px 24px;
            color: #d4a55a;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 3px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .menu-links a:hover { background: rgba(255,255,255,0.05); }

        .menu-bottom {
            margin-top: auto;
            padding: 24px;
            color: rgba(255,255,255,0.3);
            font-size: 11px;
        }

        /* ===== Header ===== */
        .header {
            text-align: center;
            padding: 0 20px;
            position: absolute;
            top: 15%;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: none;
            transform: translateY(-50%);
        }
        .header .ruby { font-size: 12px; letter-spacing: 3px; margin-bottom: 2px; }
        .header h1 { font-size: 38px; font-weight: 800; letter-spacing: 5px; margin-bottom: 6px; }
        .header .tagline { font-size: 13px; opacity: 0.7; letter-spacing: 1px; }

        /* ===== Section Label ===== */
        .section-label {
            text-align: center;
            padding: 0 20px;
            font-size: 12px;
            letter-spacing: 5px;
            position: absolute;
            top: 24%;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* ===== 3D Canvas ===== */
        .canvas-wrap {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }
        #c {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: pan-y;
        }


        /* ===== App Info ===== */
        .app-info {
            text-align: center;
            padding: 0 20px;
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: none;
        }
        .app-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            min-height: 26px;
            transition: opacity 0.25s;
        }

        .nav-dots {
            display: flex;
            justify-content: center;
            gap: 7px;
            margin-top: 12px;
        }
        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(60,40,20,0.2);
            border: none;
            cursor: pointer;
            transition: 0.3s;
            padding: 0;
            pointer-events: all;
        }
        .nav-dot.active {
            background: rgba(60,40,20,0.65);
            transform: scale(1.4);
        }

        .swipe-hint {
            font-size: 10px;
            opacity: 0.45;
            margin-top: 18px;
            letter-spacing: 1px;
            text-align: center;
            transition: opacity 1s;
            animation: blink-hint 1.8s ease-in-out infinite;
        }

        @keyframes blink-hint {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.1; }
        }

        @keyframes flash-name {
            0% { opacity: 1; text-shadow: 0 0 8px rgba(255,220,120,0.8); }
            25% { opacity: 0.4; text-shadow: none; }
            50% { opacity: 1; text-shadow: 0 0 12px rgba(255,220,120,1); }
            75% { opacity: 0.6; text-shadow: none; }
            100% { opacity: 1; text-shadow: 0 0 8px rgba(255,220,120,0.8); }
        }

        .app-name.flash {
            animation: flash-name 0.6s ease-out;
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            font-size: 11px;
            opacity: 0.5;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* ===== Dialog ===== */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
        }
        .dialog-overlay.active { opacity: 1; pointer-events: all; }

        .dialog {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            max-height: 80vh;
            overflow: hidden;
            padding: 0;
            transform: translateY(24px) scale(0.96);
            transition: transform 0.3s;
            position: relative;
        }
        .dialog-inner {
            overflow-y: auto;
            max-height: 80vh;
            padding: 28px 26px;
        }
        .dialog-overlay.active .dialog {
            transform: translateY(0) scale(1);
        }

        .dialog-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            line-height: 1;
            z-index: 1;
        }
        .dialog-close:hover { color: #333; }

        .dialog-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .dialog-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .dialog-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .dialog-title { font-size: 19px; font-weight: 700; }
        .dialog-release {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .dialog-desc {
            font-size: 13px;
            line-height: 1.9;
            color: #555;
            margin-bottom: 18px;
        }

        .dialog-screenshots {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .screenshot-card {
            flex-shrink: 0;
            width: 145px;
            border-radius: 12px;
            overflow: hidden;
            background: #fffde7;
            border: 1px solid #f0e0b0;
        }
        .screenshot-label {
            padding: 7px 8px;
            font-size: 10px;
            font-weight: 700;
            color: #e65100;
            text-align: center;
            background: #fff8e1;
        }
        .screenshot-body {
            height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c0a060;
            font-size: 11px;
            padding: 8px;
            text-align: center;
        }

        .store-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            background: #222;
            transition: background 0.2s;
        }
        .store-btn:hover { background: #444; }
        .store-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .store-placeholder {
            color: #aaa;
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 20px; letter-spacing: 2px; }
            .header .ruby { font-size: 10px; }
            .header .tagline { font-size: 11px; }
            .header { top: 11%; padding-top: 52px; }
            .section-label { top: 24%; }
            .dialog { max-width: 340px; }
            .dialog-inner { padding: 24px 20px; }
        }
    </style>
</head>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   APP DATA
   ============================================================ */
const APPS = [
    {
        id: 'drink-counter',
        name: 'お酒カウンター',
        releaseDate: '2022/05/10',
        desc: '飲んだお酒を記録するだけのシンプルなアプリ。\n\n気づいたら毎日飲んでいる…そんなあなたに。1ヶ月でどれだけ飲んでいるか？お酒にいくら使っているか？を一目で確認できます。\n\n■ 飲んだお酒の登録\n飲んだ量・金額・度数・飲酒日を記録できます。\n\n■ お酒マイリスト\nお気に入りや初めて飲んだお酒を記録して、自分だけのお酒アルバムを作れます。\n\n■ 飲酒日カレンダー\n1ヶ月の飲酒量をカレンダーで振り返れます。',
        iconBg: '#f5c842',
        iconImg: 'icon/DrinkCounterApp.webp',
        shots: [
            { label: '飲んだお酒を簡単記録！', body: 'DRINK COUNTER' },
            { label: 'ひと目で飲酒量がわかる！\n飲み過ぎ防止にも！', body: 'DRINK CALENDAR' },
        ],
        playStore: 'https://play.google.com/store/apps/details?id=com.Carknow.DrinkCounter',
        appStore: null,
    },
    {
        id: 'coming1',
        name: 'Coming Soon',
        desc: '新しいアプリを開発中です。お楽しみに！',
        iconBg: '#9e9e9e',
        iconEmoji: '？',
        shots: [],
        playStore: null,
        appStore: null,
    },
    {
        id: 'coming2',
        name: 'Coming Soon',
        desc: '新しいアプリを開発中です。お楽しみに！',
        iconBg: '#9e9e9e',
        iconEmoji: '？',
        shots: [],
        playStore: null,
        appStore: null,
    },
];

/* ============================================================
   THREE.JS SCENE
   ============================================================ */
const canvas = document.getElementById('c');
const wrap = document.getElementById('canvasWrap');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
camera.position.set(0, 6.5, 12);
camera.lookAt(0, 4.5, 0);

// Lights
scene.add(new THREE.AmbientLight(0xfff5e0, 0.7));
const dLight = new THREE.DirectionalLight(0xffffff, 1.3);
dLight.position.set(4, 6, 5);
scene.add(dLight);
const fLight = new THREE.DirectionalLight(0xffe8b0, 0.35);
fLight.position.set(-4, 3, -3);
scene.add(fLight);

/* ============================================================
   3D MODELS
   ============================================================ */
function createBeerMug() {
    const g = new THREE.Group();

    // Body profile (LatheGeometry)
    const pts = [];
    for (let i = 0; i <= 24; i++) {
        const t = i / 24;
        const y = t * 2.4;
        let r;
        if (t < 0.04) r = 0.05 + t * 17;
        else if (t < 0.82) r = 0.73 + t * 0.1;
        else r = 0.73 + 0.082 + (t - 0.82) * 0.7;
        pts.push(new THREE.Vector2(r, y));
    }
    const bodyMat = new THREE.MeshPhysicalMaterial({
        color: 0xe8b840,
        transparent: true,
        opacity: 0.5,
        roughness: 0.05,
        metalness: 0.0,
        clearcoat: 1.0,
        clearcoatRoughness: 0.05,
        side: THREE.DoubleSide,
    });
    g.add(new THREE.Mesh(new THREE.LatheGeometry(pts, 60), bodyMat));

    // Bottom disc
    const bottomMat = new THREE.MeshStandardMaterial({ color: 0xe8b840, transparent: true, opacity: 0.45 });
    const bottom = new THREE.Mesh(new THREE.CircleGeometry(0.73, 60), bottomMat);
    bottom.rotation.x = -Math.PI / 2;
    bottom.position.y = 0.1;
    g.add(bottom);

    // Beer liquid
    const beerMat = new THREE.MeshStandardMaterial({ color: 0xf0a015, roughness: 0.35, metalness: 0.05 });
    const beer = new THREE.Mesh(new THREE.CylinderGeometry(0.70, 0.66, 1.8, 60), beerMat);
    beer.position.y = 1.1;
    g.add(beer);

    // Foam base
    const foamMat = new THREE.MeshStandardMaterial({ color: 0xfffeee, roughness: 0.85 });
    const fb = new THREE.Mesh(new THREE.CylinderGeometry(0.78, 0.73, 0.32, 60), foamMat);
    fb.position.y = 2.0;
    g.add(fb);

    // Foam bubbles
    const bGeo = new THREE.SphereGeometry(1, 16, 12);
    const bubbles = [
        [0, 2.2, 0, 0.20], [-0.28, 2.22, 0.22, 0.17], [0.3, 2.24, -0.12, 0.19],
        [0.08, 2.28, 0.28, 0.15], [-0.22, 2.19, -0.28, 0.16], [0.35, 2.18, 0.15, 0.14],
        [-0.08, 2.30, 0.05, 0.18], [0.18, 2.20, -0.30, 0.13], [-0.35, 2.22, 0.0, 0.14],
    ];
    for (const [x, y, z, s] of bubbles) {
        const m = new THREE.Mesh(bGeo, foamMat);
        m.position.set(x, y, z);
        m.scale.setScalar(s);
        g.add(m);
    }

    // Handle
    const hCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0.78, 1.85, 0),
        new THREE.Vector3(1.30, 1.7, 0),
        new THREE.Vector3(1.40, 1.2, 0),
        new THREE.Vector3(1.30, 0.65, 0),
        new THREE.Vector3(0.78, 0.5, 0),
    ]);
    const hMat = new THREE.MeshPhysicalMaterial({
        color: 0xe8b840, transparent: true, opacity: 0.55,
        roughness: 0.05, clearcoat: 1.0,
    });
    g.add(new THREE.Mesh(new THREE.TubeGeometry(hCurve, 24, 0.075, 8, false), hMat));

    g.position.y = -1.1;
    g.scale.setScalar(0.84);
    return g;
}

function createGiftBox(hue) {
    const g = new THREE.Group();
    const boxMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0, roughness: 0.35, metalness: 0.05 });
    const box = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5, 2, 2, 2), boxMat);
    box.position.y = 0.75;
    g.add(box);

    // Lid
    const lidMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.3 });
    const lid = new THREE.Mesh(new THREE.BoxGeometry(1.65, 0.2, 1.65), lidMat);
    lid.position.y = 1.6;
    g.add(lid);

    // Ribbons
    const rMat = new THREE.MeshStandardMaterial({ color: hue, roughness: 0.25 });
    const rv = new THREE.Mesh(new THREE.BoxGeometry(0.14, 1.72, 1.52), rMat);
    rv.position.y = 0.85;
    g.add(rv);
    const rh = new THREE.Mesh(new THREE.BoxGeometry(1.52, 1.72, 0.14), rMat);
    rh.position.y = 0.85;
    g.add(rh);

    // Bow on top
    const bGeo = new THREE.TorusGeometry(0.22, 0.055, 8, 16);
    const b1 = new THREE.Mesh(bGeo, rMat);
    b1.position.set(-0.18, 1.78, 0);
    b1.rotation.z = 0.3;
    b1.rotation.y = 0.4;
    g.add(b1);
    const b2 = new THREE.Mesh(bGeo, rMat);
    b2.position.set(0.18, 1.78, 0);
    b2.rotation.z = -0.3;
    b2.rotation.y = -0.4;
    g.add(b2);

    // ? mark (flat text via ring + sphere)
    const qMat = new THREE.MeshStandardMaterial({ color: hue, roughness: 0.3 });
    const qRing = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.045, 8, 16, Math.PI * 1.5), qMat);
    qRing.position.set(0, 0.9, 0.77);
    qRing.rotation.y = 0;
    g.add(qRing);
    const qDot = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), qMat);
    qDot.position.set(-0.2, 0.55, 0.77);
    g.add(qDot);

    g.position.y = -0.85;
    g.scale.setScalar(0.95);
    return g;
}

/* ============================================================
   CAROUSEL
   ============================================================ */
const carousel = new THREE.Group();
scene.add(carousel);

const RADIUS_X = 12.0;  // left-right
const RADIUS_Z = 5.0;   // front-back (shorter = flatter ellipse)
const N = APPS.length;
const STEP = (Math.PI * 2) / N;
const wrappers = [];

APPS.forEach((app, i) => {
    let model;
    if (app.id === 'drink-counter') {
        model = createBeerMug();
    } else {
        model = createGiftBox(app.id === 'coming1' ? 0x6c63ff : 0xff6b9d);
    }
    model.rotation.x = 0.15; // slightly tilt forward
    const w = new THREE.Group();
    w.add(model);
    const a = i * STEP;
    w.position.set(Math.sin(a) * RADIUS_X, 5.6, Math.cos(a) * RADIUS_Z);
    w.userData = { idx: i, angle: a, baseY: model.position.y, posY: 5.6 };
    carousel.add(w);
    wrappers.push(w);
});

let curIdx = 0;
let targetRot = 0;
let curRot = 0;

function snapTo(index) {
    curIdx = ((index % N) + N) % N;
    targetRot = -curIdx * STEP;
    // unwrap to avoid spinning the long way
    while (targetRot - curRot > Math.PI) targetRot -= Math.PI * 2;
    while (targetRot - curRot < -Math.PI) targetRot += Math.PI * 2;
    updateUI();
}

function updateUI() {
    const el = document.getElementById('elAppName');
    el.textContent = APPS[curIdx].name;
    // Trigger flash animation
    el.classList.remove('flash');
    void el.offsetWidth; // force reflow
    el.classList.add('flash');
    document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i === curIdx));
}

// Build dots
const dotsEl = document.getElementById('elDots');
APPS.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'nav-dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', `App ${i + 1}`);
    d.addEventListener('click', () => snapTo(i));
    dotsEl.appendChild(d);
});
updateUI();


/* ============================================================
   DRAG / SWIPE
   ============================================================ */
let dragging = false;
let dragX0 = 0;
let rotAtDragStart = 0;
let velX = 0;
let lastX = 0;
let lastT = 0;

function ptrDown(ex) {
    const x = ex.clientX ?? ex.touches[0].clientX;
    dragging = true;
    dragX0 = x;
    rotAtDragStart = curRot;
    velX = 0;
    lastX = x;
    lastT = performance.now();
}

function ptrMove(ex) {
    if (!dragging) return;
    const x = ex.clientX ?? ex.touches[0].clientX;
    const dx = x - dragX0;
    curRot = rotAtDragStart + dx * 0.0035;
    const now = performance.now();
    const dt = now - lastT;
    if (dt > 0) velX = (x - lastX) / dt;
    lastX = x;
    lastT = now;
}

function ptrUp() {
    if (!dragging) return;
    dragging = false;
    // momentum
    curRot += velX * 90 * 0.0035;
    // snap
    const nearest = Math.round(curRot / STEP) * STEP;
    targetRot = nearest;
    curIdx = (((-Math.round(nearest / STEP)) % N) + N) % N;
    updateUI();
}

canvas.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;
    canvas.setPointerCapture(e.pointerId);
    ptrDown(e);
});
canvas.addEventListener('pointermove', (e) => ptrMove(e));
canvas.addEventListener('pointerup', (e) => ptrUp(e));
canvas.addEventListener('pointercancel', () => { dragging = false; });

/* ============================================================
   TAP → DIALOG
   ============================================================ */
const raycaster = new THREE.Raycaster();
const _mouse = new THREE.Vector2();
let downPos = [0, 0];

canvas.addEventListener('pointerdown', e => { downPos = [e.clientX, e.clientY]; });

canvas.addEventListener('click', (e) => {
    if (Math.hypot(e.clientX - downPos[0], e.clientY - downPos[1]) > 12) return;
    const r = canvas.getBoundingClientRect();
    _mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    _mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    raycaster.setFromCamera(_mouse, camera);
    for (const w of wrappers) {
        if (raycaster.intersectObjects(w.children, true).length > 0) {
            openDialog(w.userData.idx);
            return;
        }
    }
});

/* ============================================================
   DIALOG
   ============================================================ */
function openDialog(idx) {
    const app = APPS[idx];
    const ov = document.getElementById('dlgOverlay');

    // Icon: use image if available, otherwise emoji
    const iconEl = document.getElementById('dlgIcon');
    iconEl.style.background = app.iconBg;
    if (app.iconImg) {
        iconEl.innerHTML = `<img src="${app.iconImg}" alt="${app.name}">`;
    } else {
        iconEl.textContent = app.iconEmoji;
        iconEl.style.color = '#fff';
        iconEl.style.fontWeight = '700';
    }

    document.getElementById('dlgTitle').textContent = app.name;

    // Release date
    const releaseEl = document.getElementById('dlgRelease');
    releaseEl.textContent = app.releaseDate ? `リリース日: ${app.releaseDate}` : '';

    // Description with line breaks
    const descEl = document.getElementById('dlgDesc');
    descEl.innerHTML = app.desc.replace(/\n/g, '<br>');

    // store buttons - official badges
    const bEl = document.getElementById('dlgBtns');
    bEl.innerHTML = '';
    if (app.playStore || app.appStore) {
        if (app.playStore) bEl.innerHTML += `<a href="${app.playStore}" target="_blank" rel="noopener"><img src="https://play.google.com/intl/en_us/badges/static/images/badges/ja_badge_web_generic.png" alt="Google Play で手に入れよう" style="height:50px;"></a>`;
        if (app.appStore) bEl.innerHTML += `<a href="${app.appStore}" target="_blank" rel="noopener"><img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ja-jp" alt="App Storeからダウンロード" style="height:50px;"></a>`;
    } else {
        bEl.innerHTML = '<p class="store-placeholder">準備中です</p>';
    }

    ov.classList.add('active');
}

document.getElementById('btnDlgClose').addEventListener('click', () => {
    document.getElementById('dlgOverlay').classList.remove('active');
});
document.getElementById('dlgOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});

/* ============================================================
   MENU
   ============================================================ */
const sideMenu = document.getElementById('sideMenu');
const menuOv = document.getElementById('menuOverlay');
document.getElementById('btnHamburger').addEventListener('click', () => {
    sideMenu.classList.add('active');
    menuOv.classList.add('active');
});
function closeMenu() {
    sideMenu.classList.remove('active');
    menuOv.classList.remove('active');
}
document.getElementById('btnMenuClose').addEventListener('click', closeMenu);
menuOv.addEventListener('click', closeMenu);

/* ============================================================
   RESIZE
   ============================================================ */
function onResize() {
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);
onResize();

/* ============================================================
   ANIMATION LOOP
   ============================================================ */
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Smooth spring towards target
    if (!dragging) {
        curRot += (targetRot - curRot) * 0.09;
    }

    // Reposition each model on the ellipse (no group rotation)
    for (const w of wrappers) {
        const model = w.children[0];
        const a = w.userData.angle + curRot;

        // Ellipse position (tilt: front lower, back higher)
        const TILT = 0.4;
        w.position.x = Math.sin(a) * RADIUS_X;
        w.position.z = Math.cos(a) * RADIUS_Z;
        w.position.y = w.userData.posY - Math.cos(a) * TILT;

        // Counter-rotate so front face always visible
        model.rotation.y = -curRot * 0.35 + Math.sin(t * 0.8 + w.userData.idx) * 0.15;

        // Bobbing
        model.position.y = w.userData.baseY + Math.sin(t * 1.2 + w.userData.idx * 1.5) * 0.1;

        // Scale: front = 1, back = smaller
        const norm = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        const dist = Math.min(norm, Math.PI * 2 - norm);
        const s = THREE.MathUtils.lerp(0.55, 1.0, 1 - dist / Math.PI);
        w.scale.setScalar(s);
    }

    renderer.render(scene, camera);
}
animate();

// Fade hint after a few seconds
setTimeout(() => {
    const h = document.getElementById('elHint');
    if (h) h.style.opacity = '0';
}, 5000);

</script>
